services:

  estoque-db:
    image: postgres
    environment:
      POSTGRES_DB: estoque
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  faturamento-db:
    image: postgres
    environment:
      POSTGRES_DB: faturamento
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  estoque-service:
    build: ./estoque-service/EstoqueService
    ports:
      - "5000:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Host=estoque-db;Database=estoque;Username=postgres;Password=postgres"
    depends_on:
      estoque-db:
        condition: service_healthy

  faturamento-service:
    build: ./faturamento-service/FaturamentoService
    ports:
      - "5001:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Host=faturamento-db;Database=faturamento;Username=postgres;Password=postgres"
    depends_on:
      faturamento-db:
        condition: service_healthy
      estoque-service:
        condition: service_started